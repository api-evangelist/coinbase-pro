  nativeAmount: AccountBalance!
  description: String
  createdAt: DateTime!
  updatedAt: DateTime!
  resource: String!
  status: String!
  paymentMethod: PaymentMethod
  committed: Boolean!
  fee: AccountBalance
  transferId: String
  payoutAt: DateTime
  instant: Boolean!
