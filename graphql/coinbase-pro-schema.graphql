"""
Coinbase Advanced Trade - Conceptual GraphQL Schema
Source: https://docs.cdp.coinbase.com/advanced-trade/docs/
SDK:    https://github.com/coinbase/coinbase-advanced-py
"""

scalar Decimal
scalar DateTime
scalar JSON

# ─── Enumerations ────────────────────────────────────────────────────────────

enum OrderSide {
  BUY
  SELL
}

enum OrderType {
  MARKET
  LIMIT
  STOP
  STOP_LIMIT
}

enum OrderStatus {
  PENDING
  OPEN
  FILLED
  CANCELLED
  EXPIRED
  FAILED
  UNKNOWN_ORDER_STATUS
}

enum TimeInForce {
  GOOD_TILL_CANCELLED
  GOOD_TILL_DATE_TIME
  IMMEDIATE_OR_CANCEL
  FILL_OR_KILL
  UNKNOWN_TIME_IN_FORCE
}

enum CurrencyType {
  CRYPTO
  FIAT
  UNKNOWN_CURRENCY_TYPE
}

enum OrderPlacementSource {
  RETAIL_ADVANCED
  RETAIL_SIMPLE
  UNKNOWN_PLACEMENT_SOURCE
}

enum ContractExpiryType {
  UNKNOWN_CONTRACT_EXPIRY_TYPE
  EXPIRING
  PERPETUAL
}

enum WebhookEventType {
  ORDERS
  MARKET_TRADES
  LEVEL2
  USER
  HEARTBEATS
  CANDLES
  TICKER
  TICKER_BATCH
  STATUS
}

enum NotificationStatus {
  UNREAD
  READ
}

# ─── Scalars and utility types ────────────────────────────────────────────────

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

# ─── Account Domain ───────────────────────────────────────────────────────────

"""A user's trading account on Coinbase Advanced Trade."""
type Account {
  uuid: ID!
  name: String!
  currency: String!
  availableBalance: AccountBalance!
  default: Boolean!
  active: Boolean!
  createdAt: DateTime!
  updatedAt: DateTime!
  deletedAt: DateTime
  type: String
  ready: Boolean!
  hold: AccountBalance!
}

"""Balance value and currency denomination."""
type AccountBalance {
  value: Decimal!
  currency: String!
}

"""Currency details attached to an account."""
type AccountCurrency {
  code: String!
  name: String!
  color: String
  sortIndex: Int
  exponent: Int!
  type: CurrencyType!
  addressRegex: String
  assetUrl: String
}

type AccountConnection {
  edges: [AccountEdge!]!
  pageInfo: PageInfo!
}

type AccountEdge {
  node: Account!
  cursor: String!
}

# ─── Portfolio Domain ─────────────────────────────────────────────────────────

"""A named portfolio grouping positions and balances."""
type Portfolio {
  uuid: ID!
  name: String!
  type: String!
  deleted: Boolean!
}

"""Aggregate balance of a portfolio expressed in a target currency."""
type PortfolioBalance {
  totalBalance: Decimal!
  totalBalanceFiat: Decimal!
  totalUnrealizedPnl: Decimal!
  totalUnrealizedPnlFiat: Decimal!
  unrealizedPnlPercent: Decimal!
  portfolioUuid: ID!
}

"""Collection of open positions within a portfolio."""
type PortfolioPositions {
  portfolioUuid: ID!
  positions: [Position!]!
  perpetualFuturesPositions: [Position!]!
  expiringFuturesPositions: [Position!]!
}

"""A single open position in a product."""
type Position {
  productId: String!
  productUuid: ID!
  symbol: String!
  avgEntryPrice: Decimal!
  numberOfContracts: Decimal!
  totalCost: Decimal!
  totalValue: Decimal!
  unrealizedPnl: Decimal!
  unrealizedPnlPercent: Decimal!
  dailyRealizedPnl: Decimal!
  side: OrderSide!
  leverage: Decimal
  marginType: String
}

# ─── Order Domain ─────────────────────────────────────────────────────────────

"""The core order object covering all order types."""
type Order {
  orderId: ID!
  productId: String!
  userId: String!
  side: OrderSide!
  clientOrderId: String
  status: OrderStatus!
  timeInForce: TimeInForce
  createdTime: DateTime!
  completionPercentage: Decimal!
  filledSize: Decimal!
  averageFilledPrice: Decimal!
  fee: Decimal
  numberOfFills: Int!
  filledValue: Decimal!
  pendingCancel: Boolean!
  sizeInQuote: Boolean!
  totalFees: Decimal!
  sizeFiatValue: Decimal
  outstandingHoldAmount: Decimal!
  isLiquidation: Boolean!
  lastFillTime: DateTime
  editHistory: [OrderEditRecord!]
  leverage: Decimal
  marginType: String
  retailPortfolioId: String
  originatingOrderId: String
  attachedOrderId: String
  orderPlacementSource: OrderPlacementSource
  contractExpiryType: ContractExpiryType
  orderConfiguration: OrderConfiguration
  triggerStatus: String
  cancelMessage: String
  rejectMessage: String
  rejectReason: String
  settledAt: DateTime
  orderError: OrderError
}

"""Union-style wrapper for order configuration details."""
type OrderConfiguration {
  marketMarketIoc: MarketOrder
  limitLimitGtc: LimitOrder
  limitLimitGtd: LimitOrder
  stopLimitStopLimitGtc: StopLimitOrder
  stopLimitStopLimitGtd: StopLimitOrder
  triggerBracketGtc: StopOrder
  triggerBracketGtd: StopOrder
}

"""Market order configuration."""
type MarketOrder {
  quoteSize: Decimal
  baseSize: Decimal
}

"""Limit order configuration."""
type LimitOrder {
  baseSize: Decimal!
  limitPrice: Decimal!
  endTime: DateTime
  postOnly: Boolean!
}

"""Stop order configuration."""
type StopOrder {
  baseSize: Decimal!
  limitPrice: Decimal!
  stopTriggerPrice: Decimal!
  endTime: DateTime
}

"""Stop-limit order configuration."""
type StopLimitOrder {
  baseSize: Decimal!
  limitPrice: Decimal!
  stopPrice: Decimal!
  endTime: DateTime
  stopDirection: String!
}

"""Record of an edit made to a placed order."""
type OrderEditRecord {
  price: Decimal!
  size: Decimal!
  replaceAcceptTimestamp: DateTime!
}

"""Error detail returned when an order fails."""
type OrderError {
  error: String!
  message: String!
  previewFailureReason: String
  newOrderFailureReason: String
}

"""A single execution fill against an order."""
type OrderFill {
  entryId: String!
  tradeId: String!
  orderId: ID!
  tradeTime: DateTime!
  tradeType: String!
  price: Decimal!
  size: Decimal!
  commission: Decimal!
  productId: String!
  sequenceTimestamp: DateTime!
  liquidityIndicator: String
  sizeInQuote: Boolean!
  userId: String!
  side: OrderSide!
  retailPortfolioId: String
}

type OrderConnection {
  edges: [OrderEdge!]!
  pageInfo: PageInfo!
  hasNext: Boolean!
  cursor: String
}

type OrderEdge {
  node: Order!
  cursor: String!
}

# ─── Fill / Trade Domain ──────────────────────────────────────────────────────

"""Detailed record of a trade fill including fee and liquidity."""
type FillRecord {
  entryId: String!
  tradeId: String!
  orderId: ID!
  tradeTime: DateTime!
  price: Decimal!
  size: Decimal!
  commission: Decimal!
  productId: String!
  sequenceTimestamp: DateTime!
  liquidityIndicator: String
  sizeInQuote: Boolean!
  userId: String!
  side: OrderSide!
}

"""A completed trade on the exchange."""
type Trade {
  tradeId: String!
  productId: String!
  price: Decimal!
  size: Decimal!
  time: DateTime!
  side: OrderSide!
  bid: Decimal
  ask: Decimal
}

# ─── Market Data Domain ───────────────────────────────────────────────────────

"""Metadata about a tradeable product."""
type ProductData {
  productId: ID!
  price: Decimal!
  pricePercentageChange24h: Decimal!
  volume24h: Decimal!
  volumePercentageChange24h: Decimal!
  baseIncrement: Decimal!
  quoteIncrement: Decimal!
  quoteMinSize: Decimal!
  quoteMaxSize: Decimal!
  baseMinSize: Decimal!
  baseMaxSize: Decimal!
  baseName: String!
  quoteName: String!
  watched: Boolean!
  isDisabled: Boolean!
  new: Boolean!
  status: String!
  cancelOnly: Boolean!
  limitOnly: Boolean!
  postOnly: Boolean!
  tradingDisabled: Boolean!
  auctionMode: Boolean!
  productType: String!
  quoteCurrencyId: String!
  baseCurrencyId: String!
  midMarketPrice: Decimal
  alias: String
  aliasTo: [String!]
  baseDisplaySymbol: String!
  quoteDisplaySymbol: String!
  viewOnly: Boolean!
  priceIncrement: Decimal
  displayName: String!
  productVenue: String
  approximateQuote24hVolume: Decimal
  fcmTradingSessionDetails: JSON
  midMarketPricePercentageChange24h: Decimal
  priceBandingEnabled: Boolean
  contractExpiryType: ContractExpiryType
}

"""Base and quote currency pairing details."""
type TradingPair {
  id: ID!
  baseCurrency: String!
  quoteCurrency: String!
  quoteIncrement: Decimal!
  baseIncrement: Decimal!
  displayName: String!
  minMarketFunds: Decimal!
  marginEnabled: Boolean!
  postOnly: Boolean!
  limitOnly: Boolean!
  cancelOnly: Boolean!
  status: String!
  statusMessage: String
  auctionMode: Boolean!
}

"""Real-time snapshot of a product's market state."""
type MarketData {
  productId: String!
  price: Decimal!
  volume24h: Decimal!
  low24h: Decimal!
  high24h: Decimal!
  low52w: Decimal
  high52w: Decimal
  pricePercentageChange24h: Decimal!
  volume: Decimal!
}

"""A single price level in the order book."""
type BookOrder {
  price: Decimal!
  size: Decimal!
  numOrders: Int
}

"""Full or aggregated order book for a product."""
type OrderBook {
  productId: String!
  bids: [BookOrder!]!
  asks: [BookOrder!]!
  time: DateTime!
}

"""Latest price, volume, and bid/ask for a product."""
type Ticker {
  tradeId: String!
  price: Decimal!
  size: Decimal!
  time: DateTime!
  bid: Decimal!
  ask: Decimal!
  volume: Decimal!
}

"""OHLCV candlestick data point."""
type Candle {
  start: DateTime!
  low: Decimal!
  high: Decimal!
  open: Decimal!
  close: Decimal!
  volume: Decimal!
}

"""24-hour rolling statistics for a product."""
type Stats24h {
  open: Decimal!
  high: Decimal!
  low: Decimal!
  last: Decimal!
  volume: Decimal!
  volume30Day: Decimal!
}

"""Open, high, low, volume, last for the current day."""
type DailyStats {
  open: Decimal!
  high: Decimal!
  low: Decimal!
  last: Decimal!
  volume: Decimal!
  date: DateTime!
}

"""Volume metrics across a set of products."""
type TradingVolume {
  productId: String!
  volume: Decimal!
  currency: String!
  time: DateTime!
}

"""Aggregated statistics for a product."""
type ProductStats {
  open: Decimal!
  high: Decimal!
  low: Decimal!
  last: Decimal!
  volume: Decimal!
  rfqVolume: Decimal
  indexPrice: Decimal
}

# ─── Currency and Rate Domain ─────────────────────────────────────────────────

"""Details about a supported currency."""
type CurrencyInfo {
  id: ID!
  name: String!
  minSize: Decimal!
  status: String!
  message: String
  maxPrecision: Decimal!
  convertibleTo: [String!]
  details: CurrencyDetails
  defaultNetwork: String
  supportedNetworks: [NetworkInfo!]
}

type CurrencyDetails {
  type: CurrencyType!
  symbol: String
  networkConfirmations: Int
  sortOrder: Int
  cryptoAddressLink: String
  cryptoTransactionLink: String
  pushPaymentMethods: [String!]
  groupTypes: [String!]
}

type NetworkInfo {
  id: String!
  name: String!
  status: String!
  contractAddress: String
  cryptoAddressLink: String
  cryptoTransactionLink: String
  minWithdrawalAmount: Decimal
  maxWithdrawalAmount: Decimal
  networkConfirmations: Int
  processingTimeSeconds: Int
}

"""List of supported fiat currencies."""
type FiatCurrencies {
  currencies: [CurrencyInfo!]!
}

"""Conversion rate between two currencies."""
type ExchangeRate {
  currency: String!
  rates: JSON!
  rate: Decimal
  toCurrency: String
}

"""A quoted price for a fiat-to-fiat conversion."""
type ConversionQuote {
  id: ID!
  fromAccount: String!
  toAccount: String!
  unitPrice: ConversionPrice!
  totalFee: ConversionPrice!
  feeMetadata: JSON
  sourceAmount: ConversionPrice!
  targetAmount: ConversionPrice!
  expiresAt: DateTime!
  cancelUrl: String
  supportUrl: String
}

type ConversionPrice {
  amount: Decimal!
  currency: String!
}

"""A completed currency conversion record."""
type Conversion {
  id: ID!
  amount: Decimal!
  fromAccount: ID!
  toAccount: ID!
  conversionFee: Decimal!
  spread: Decimal!
  subtotalAmount: Decimal!
  totalAmount: Decimal!
  funds: Decimal!
  payout: Decimal!
  userId: ID!
  status: String!
}

"""Request/response wrapper for conversion operations."""
type Convert {
  quote: ConversionQuote
  conversion: Conversion
}

# ─── Transaction Domain ───────────────────────────────────────────────────────

"""A general ledger entry (deposit, withdrawal, trade, fee, etc.)."""
type Transaction {
  id: ID!
  type: String!
  amount: AccountBalance!
  nativeAmount: AccountBalance!
  description: String
  createdAt: DateTime!
  updatedAt: DateTime!
  resource: String!
  status: String!
  instant: Boolean!
  details: TransactionDetails
}

type TransactionDetails {
  title: String
  subtitle: String
  header: String
  health: String
}

# ─── Payment and Banking Domain ───────────────────────────────────────────────

"""A fiat payment transaction record."""
type FiatPayment {
  id: ID!
  type: String!
