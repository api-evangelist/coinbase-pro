# ─── Root Types ───────────────────────────────────────────────────────────────

type Query {
  """Fetch a specific account by UUID."""
  account(uuid: ID!): Account

  """List all accounts for the authenticated user."""
  accounts(limit: Int, cursor: String): AccountConnection!

  """Get a specific order by order ID."""
  order(orderId: ID!): Order

  """List orders with optional filters."""
  orders(input: ListOrdersInput): OrderConnection!

  """List fills (trade executions) for orders."""
  fills(input: ListFillsInput): [FillRecord!]!

  """Get a specific product by product ID."""
  product(productId: ID!): ProductData

  """List all products, optionally filtered."""
  products(
    limit: Int
    offset: Int
    productType: String
    productIds: [String!]
    contractExpiryType: ContractExpiryType
    expiringContractStatus: String
    getAllProducts: Boolean
  ): [ProductData!]!

  """Get order book for a product."""
  productBook(productId: ID!, limit: Int, aggregationPriceIncrement: Decimal): OrderBook!

  """Get candlestick data for a product."""
  candles(input: GetCandlesInput!): [Candle!]!

  """Get the latest trades for a product."""
  marketTrades(productId: ID!, limit: Int, start: DateTime, end: DateTime): [Trade!]!

  """Get best bid/ask for a product."""
  bestBidAsk(productIds: [String!]!): [MarketData!]!

  """Get a specific portfolio by UUID."""
  portfolio(portfolioUuid: ID!): Portfolio

  """List all portfolios."""
  portfolios(portfolioType: String): [Portfolio!]!

  """Get portfolio breakdown (balances and positions)."""
  portfolioBreakdown(portfolioUuid: ID!, currency: String): PortfolioPositions!

  """Get a payment method by ID."""
  paymentMethod(paymentMethodId: ID!): PaymentMethod

  """List payment methods for the authenticated user."""
  paymentMethods: [PaymentMethod!]!

  """Get a specific transaction."""
  transaction(accountId: ID!, transactionId: ID!): Transaction

  """List transactions for an account."""
  transactions(accountId: ID!, limit: Int, offset: Int): [Transaction!]!

  """Get a crypto deposit address for an account."""
  cryptoAddress(accountId: ID!, addressId: ID!): CryptoAddress

  """List crypto deposit addresses for an account."""
  cryptoAddresses(accountId: ID!): [CryptoAddress!]!

  """Get exchange rates for a base currency."""
  exchangeRates(currency: String!): ExchangeRate!

  """Get all supported currencies."""
  currencies: [CurrencyInfo!]!

  """Get a specific currency."""
  currency(currencyId: ID!): CurrencyInfo

  """Get fiat currencies only."""
  fiatCurrencies: FiatCurrencies!

  """Estimate network fee for a crypto withdrawal."""
  cryptoWithdrawalFeeEstimate(currency: String!, cryptoAddress: String!, networkArn: String): FeeEstimate!

  """Get conversion quote."""
  conversionQuote(input: CreateConversionQuoteInput!): ConversionQuote!

  """Get a conversion by ID."""
  conversion(userNativeCurrency: String!, conversionId: ID!): Convert!

  """List registered webhooks."""
  webhooks: [Webhook!]!

  """Get a specific webhook."""
  webhook(webhookId: ID!): Webhook

  """Get API key details (non-secret)."""
  apiKey: APIKey

  """List notifications."""
  notifications(limit: Int, cursor: String): [Notification!]!

  """Get 24h stats for a product."""
  productStats(productId: ID!): ProductStats!

  """Get ticker for a product."""
  ticker(productId: ID!): Ticker!
}

type Mutation {
  """Place a new order."""
  createOrder(input: CreateOrderInput!): Order!

  """Cancel a specific order."""
  cancelOrder(orderId: ID!): Boolean!

  """Cancel multiple orders at once."""
  cancelOrders(orderIds: [ID!]!): [String!]!

  """Edit an existing open order."""
  editOrder(input: EditOrderInput!): Order!

  """Preview an order edit without committing."""
  editOrderPreview(input: EditOrderInput!): Order!

  """Create a new portfolio."""
  createPortfolio(input: CreatePortfolioInput!): Portfolio!

  """Delete a portfolio."""
  deletePortfolio(portfolioUuid: ID!): Boolean!

  """Edit a portfolio name."""
  editPortfolio(portfolioUuid: ID!, name: String!): Portfolio!

  """Move funds between portfolios."""
  movePortfolioFunds(input: MovePortfolioFundsInput!): PortfolioBalance!

  """Create a new deposit address for an account."""
  createCryptoAddress(input: CreateAddressInput!): CryptoAddress!

  """Withdraw crypto from an account."""
  withdrawCrypto(accountId: ID!, input: WithdrawCryptoInput!): WithdrawalInfo!

  """Withdraw fiat from an account."""
  withdrawFiat(accountId: ID!, input: WithdrawFiatInput!): FiatPayment!

  """Deposit fiat into an account."""
  depositFiat(accountId: ID!, input: DepositFiatInput!): FiatPayment!

  """Commit a conversion after receiving a quote."""
  commitConversion(input: CommitConversionInput!): Conversion!

  """Create a webhook."""
  createWebhook(input: CreateWebhookInput!): Webhook!

  """Update a webhook."""
  updateWebhook(input: UpdateWebhookInput!): Webhook!

  """Delete a webhook."""
  deleteWebhook(webhookId: ID!): Boolean!
}

type Subscription {
  """Real-time ticker updates for a product."""
  ticker(productIds: [String!]!): Ticker!

  """Batch ticker updates."""
  tickerBatch(productIds: [String!]!): [Ticker!]!

  """Level 2 order book updates."""
  level2(productIds: [String!]!): OrderBook!

  """Real-time market trades."""
  marketTrades(productIds: [String!]!): Trade!

  """User order and fill updates."""
  user: Order!

  """Candlestick updates."""
  candles(productIds: [String!]!, granularity: String!): Candle!

  """Heartbeat to keep connection alive."""
  heartbeats: DateTime!

  """Status updates for products."""
  status(productIds: [String!]!): ProductData!
}
